# SecretGuard Configuration

# Paths to exclude from scanning
exclude:
  - "node_modules/**"
  - "vendor/**"
  - ".git/**"
  - "*.test.js"
  - "*.test.py"
  - "*.spec.ts"

# Minimum confidence threshold (0.0-1.0)
confidence_threshold: 0.75

# Custom patterns (regex)
custom_patterns:
  - name: "Demo Pattern"
    pattern: "DEMO_[A-Z0-9]{16}"
    confidence: 0.85
    severity: medium
    remediation: "This is just a demo pattern"

# Allowlist (ignore specific findings)
allowlist:
  - file: "config.py"
    line: 12
    reason: "Test API key for demo purposes"

# False positive patterns to ignore
ignore_patterns:
  - "example_api_key_here"
  - "REPLACE_WITH_YOUR_KEY"
  - "your_api_key_here"
  - "INSERT_API_KEY_HERE"
